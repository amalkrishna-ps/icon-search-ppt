<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Search</title>
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" async></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px; color: #242424; background: #fff;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        .header { padding: 16px 16px 12px; background: linear-gradient(135deg, #6264A7, #464EB8); color: #fff; }
        .header h1 { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
        .search-wrap { display: flex; gap: 6px; }
        .search-wrap input {
            flex: 1; padding: 9px 12px; border: none; border-radius: 6px;
            font-size: 13px; background: rgba(255,255,255,0.95); outline: none;
        }
        .search-wrap input::placeholder { color: #999; }
        .search-wrap button {
            padding: 9px 14px; background: rgba(255,255,255,0.2); color: #fff;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .search-wrap button:hover { background: rgba(255,255,255,0.3); }

        .filters {
            display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto;
            border-bottom: 1px solid #f0f0f0; background: #fafafa; flex-shrink: 0;
        }
        .filters::-webkit-scrollbar { height: 0; }
        .pill {
            padding: 5px 12px; border-radius: 16px; font-size: 12px; font-weight: 500;
            border: 1px solid #e0e0e0; background: #fff; color: #555;
            cursor: pointer; white-space: nowrap; transition: all 0.15s;
        }
        .pill:hover { border-color: #6264A7; color: #6264A7; }
        .pill.active { background: #6264A7; color: #fff; border-color: #6264A7; }

        .icon-area { flex: 1; overflow-y: auto; padding: 12px; }
        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px;
        }
        .icon-card {
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 4px 8px; border-radius: 8px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.12s;
        }
        .icon-card:hover { background: #f5f5ff; border-color: #c8c8f0; }
        .icon-card.selected { background: #eef0ff; border-color: #6264A7; }
        .icon-card img { width: 36px; height: 36px; margin-bottom: 5px; }
        .icon-card .name {
            font-size: 9px; color: #888; text-align: center; line-height: 1.2;
            word-break: break-word; max-height: 22px; overflow: hidden;
        }

        .state-msg {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: #aaa; gap: 8px; padding: 20px; text-align: center;
        }
        .state-msg .emoji { font-size: 36px; }
        .spinner {
            width: 24px; height: 24px; border: 3px solid #e0e0e0;
            border-top-color: #6264A7; border-radius: 50%;
            animation: spin 0.5s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .bottom-panel {
            border-top: 1px solid #e8e8e8; padding: 12px 16px;
            background: #fafafa; flex-shrink: 0;
        }
        .selected-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .selected-info img { width: 32px; height: 32px; }
        .selected-info .sel-name { font-weight: 600; font-size: 13px; color: #6264A7; }
        .size-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .size-row label { font-size: 12px; color: #666; }
        .size-row input[type="range"] { flex: 1; accent-color: #6264A7; }
        .size-val { font-size: 12px; font-weight: 600; color: #6264A7; min-width: 30px; }
        .insert-btn {
            width: 100%; padding: 10px; background: #6264A7; color: #fff;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .insert-btn:hover { background: #4f52a0; }
        .insert-btn:disabled { background: #c8c8d0; cursor: default; }
        .status { margin-top: 6px; font-size: 11px; text-align: center; color: #888; min-height: 16px; }
        .status.ok { color: #107c10; font-weight: 600; }
        .status.err { color: #d13438; }

        .icon-area::-webkit-scrollbar { width: 6px; }
        .icon-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Icon Search</h1>
    <div class="search-wrap">
        <input type="text" id="q" placeholder="Search… e.g. heart, chart, star" autofocus />
        <button id="searchBtn">Go</button>
    </div>
</div>

<div class="filters">
    <button class="pill active" data-prefix="fluent">Fluent ★</button>
    <button class="pill" data-prefix="mdi">Material</button>
    <button class="pill" data-prefix="heroicons">Heroicons</button>
    <button class="pill" data-prefix="tabler">Tabler</button>
    <button class="pill" data-prefix="lucide">Lucide</button>
    <button class="pill" data-prefix="ph">Phosphor</button>
    <button class="pill" data-prefix="">All 200k+</button>
</div>

<div class="icon-area" id="iconArea">
    <div class="state-msg">
        <span class="emoji">🔍</span>
        <span>Search for an icon to get started</span>
    </div>
</div>

<div class="bottom-panel" id="bottomPanel" style="display:none;">
    <div class="selected-info" id="selInfo"></div>
    <div class="size-row">
        <label>Size:</label>
        <input type="range" id="sizeSlider" min="0.5" max="4" step="0.25" value="1.5" />
        <span class="size-val" id="sizeVal">1.5"</span>
    </div>
    <button class="insert-btn" id="insertBtn" disabled>Copy Icon to Clipboard</button>
    <div class="status" id="status"></div>
</div>

<!-- Hidden canvas for SVG→PNG conversion -->
<canvas id="cvs" style="display:none;"></canvas>

<script>
/* =============================================================
   Fully serverless — calls Iconify API directly, no local server
   SVG→PNG conversion via browser Canvas
   ============================================================= */

var ICONIFY_SEARCH = "https://api.iconify.design/search";
var ICONIFY_SVG = "https://api.iconify.design/";
var selectedIcon = null;
var activePrefix = "fluent";

var qEl = document.getElementById("q");
var searchBtn = document.getElementById("searchBtn");
var iconArea = document.getElementById("iconArea");
var bottomPanel = document.getElementById("bottomPanel");
var selInfo = document.getElementById("selInfo");
var insertBtn = document.getElementById("insertBtn");
var sizeSlider = document.getElementById("sizeSlider");
var sizeValEl = document.getElementById("sizeVal");
var statusEl = document.getElementById("status");
var canvas = document.getElementById("cvs");

var isOfficeReady = false;

try {
    if (typeof Office !== "undefined") {
        Office.onReady(function() { 
            isOfficeReady = true;
            document.getElementById("insertBtn").textContent = "Insert into Slide";
            setStatus("Ready", ""); 
        });
    }
} catch(e) {}

// Timeout: if Office.js doesn't load in 3s, proceed anyway
setTimeout(function() {
    if (!isOfficeReady) setStatus("Ready — use Copy mode", "");
}, 3000);

/* ── Filter pills ────────────────────────── */
document.querySelectorAll(".pill").forEach(function(pill) {
    pill.addEventListener("click", function() {
        document.querySelector(".pill.active").classList.remove("active");
        pill.classList.add("active");
        activePrefix = pill.dataset.prefix;
        if (qEl.value.trim()) doSearch();
    });
});

/* ── Search ──────────────────────────────── */
searchBtn.addEventListener("click", doSearch);
qEl.addEventListener("keydown", function(e) { if (e.key === "Enter") doSearch(); });

async function doSearch() {
    var query = qEl.value.trim();
    if (!query) return;
    searchBtn.disabled = true;
    iconArea.innerHTML = '<div class="state-msg"><div class="spinner"></div></div>';
    bottomPanel.style.display = "none";
    selectedIcon = null;

    try {
        var url = ICONIFY_SEARCH + "?query=" + encodeURIComponent(query) + "&limit=48";
        if (activePrefix) url += "&prefixes=" + activePrefix;
        var resp = await fetch(url);
        if (!resp.ok) throw new Error("Search failed");
        var data = await resp.json();
        var icons = data.icons || [];
        if (icons.length === 0) {
            iconArea.innerHTML = '<div class="state-msg"><span class="emoji">😕</span><span>No results. Try another keyword or library.</span></div>';
            return;
        }
        // icons is an array of strings like "fluent:heart-24-filled"
        var parsed = icons.map(function(full) {
            var parts = full.split(":");
            return { prefix: parts[0], name: parts.slice(1).join(":"), full: full };
        });
        renderGrid(parsed);
    } catch(err) {
        iconArea.innerHTML = '<div class="state-msg"><span class="emoji">⚠️</span><span>' + esc(err.message) + '</span></div>';
    } finally {
        searchBtn.disabled = false;
    }
}

/* ── Grid ────────────────────────────────── */
function renderGrid(icons) {
    var html = '<div class="icon-grid">';
    icons.forEach(function(ic) {
        // Use Iconify API directly for SVG preview
        var svgUrl = ICONIFY_SVG + encodeURIComponent(ic.prefix) + "/" + encodeURIComponent(ic.name) + ".svg?width=72&height=72&color=%23333";
        html += '<div class="icon-card" data-prefix="' + esc(ic.prefix) + '" data-name="' + esc(ic.name) + '" data-full="' + esc(ic.full) + '">'
             + '<img src="' + svgUrl + '" loading="lazy" />'
             + '<div class="name">' + esc(ic.name) + '</div></div>';
    });
    html += '</div>';
    iconArea.innerHTML = html;
    document.querySelectorAll(".icon-card").forEach(function(card) {
        card.addEventListener("click", function() { selectCard(card); });
    });
}

function selectCard(card) {
    var prev = document.querySelector(".icon-card.selected");
    if (prev) prev.classList.remove("selected");
    card.classList.add("selected");
    selectedIcon = { prefix: card.dataset.prefix, name: card.dataset.name, full: card.dataset.full };
    var svgUrl = ICONIFY_SVG + encodeURIComponent(selectedIcon.prefix) + "/" + encodeURIComponent(selectedIcon.name) + ".svg?width=72&height=72&color=%23333";
    selInfo.innerHTML = '<img src="' + svgUrl + '" /><span class="sel-name">' + esc(selectedIcon.full) + '</span>';
    bottomPanel.style.display = "block";
    insertBtn.disabled = false;
    setStatus("", "");
}

/* ── Size slider ─────────────────────────── */
sizeSlider.addEventListener("input", function() { sizeValEl.textContent = sizeSlider.value + '"'; });

/* ── Insert / Copy ────────────────────────── */
insertBtn.addEventListener("click", async function() {
    if (!selectedIcon) return;
    insertBtn.disabled = true;
    setStatus("Preparing icon...", "");

    try {
        // Fetch large SVG from Iconify
        var svgUrl = ICONIFY_SVG + encodeURIComponent(selectedIcon.prefix) + "/" + encodeURIComponent(selectedIcon.name) + ".svg?width=1024&height=1024&color=%23333333";
        var resp = await fetch(svgUrl);
        if (!resp.ok) throw new Error("Failed to download icon");
        var svgText = await resp.text();

        // Convert SVG to PNG via Canvas
        var base64png = await svgToPngBase64(svgText, 1024);

        if (isOfficeReady) {
            // Inside PowerPoint — insert directly
            setStatus("Inserting...", "");
            Office.context.document.setSelectedDataAsync(base64png, {
                coercionType: Office.CoercionType.Image,
                imageWidth: parseFloat(sizeSlider.value) * 72,
                imageHeight: parseFloat(sizeSlider.value) * 72
            }, function(result) {
                if (result.status === Office.AsyncResultStatus.Succeeded) {
                    setStatus("Inserted " + selectedIcon.full + " ✓", "ok");
                } else {
                    setStatus("Error: " + result.error.message, "err");
                }
                insertBtn.disabled = false;
            });
        } else {
            // In browser — copy PNG to clipboard
            setStatus("Copying...", "");
            var byteChars = atob(base64png);
            var byteArr = new Uint8Array(byteChars.length);
            for (var i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
            var pngBlob = new Blob([byteArr], { type: "image/png" });

            await navigator.clipboard.write([
                new ClipboardItem({ "image/png": pngBlob })
            ]);
            setStatus("Copied! Paste into PowerPoint with Cmd+V ✓", "ok");
            insertBtn.disabled = false;
        }
    } catch(err) {
        setStatus("Error: " + err.message, "err");
        insertBtn.disabled = false;
    }
});

/* ── SVG → PNG via Canvas ────────────────── */
function svgToPngBase64(svgText, size) {
    return new Promise(function(resolve, reject) {
        // Create a blob URL from the SVG text
        var blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
        var url = URL.createObjectURL(blob);

        var img = new Image();
        img.onload = function() {
            canvas.width = size;
            canvas.height = size;
            var ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, size, size);
            ctx.drawImage(img, 0, 0, size, size);
            URL.revokeObjectURL(url);

            // Get base64 PNG (strip the data:image/png;base64, prefix)
            var dataUrl = canvas.toDataURL("image/png");
            var base64 = dataUrl.split(",")[1];
            resolve(base64);
        };
        img.onerror = function() {
            URL.revokeObjectURL(url);
            reject(new Error("Failed to render icon"));
        };
        img.src = url;
    });
}

/* ── Helpers ──────────────────────────────── */
function setStatus(m, c) { statusEl.textContent = m; statusEl.className = "status" + (c ? " " + c : ""); }
function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
