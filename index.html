<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Search</title>
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" async></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px; color: #242424; background: #fff;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        .header { padding: 12px 16px 10px; background: linear-gradient(135deg, #6264A7, #464EB8); color: #fff; }
        .search-wrap { display: flex; gap: 6px; }
        .search-wrap input {
            flex: 1; padding: 9px 12px; border: none; border-radius: 6px;
            font-size: 13px; background: rgba(255,255,255,0.95); outline: none;
        }
        .search-wrap input::placeholder { color: #999; }
        .search-wrap button {
            padding: 9px 14px; background: rgba(255,255,255,0.2); color: #fff;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .search-wrap button:hover { background: rgba(255,255,255,0.3); }

        .filters {
            display: flex; gap: 5px; padding: 8px 12px; overflow-x: auto;
            border-bottom: 1px solid #f0f0f0; background: #fafafa; flex-shrink: 0;
            flex-wrap: wrap;
        }
        .filters::-webkit-scrollbar { height: 0; }
        .pill {
            padding: 4px 10px; border-radius: 14px; font-size: 11px; font-weight: 500;
            border: 1px solid #e0e0e0; background: #fff; color: #555;
            cursor: pointer; white-space: nowrap; transition: all 0.15s;
        }
        .pill:hover { border-color: #6264A7; color: #6264A7; }
        .pill.active { background: #6264A7; color: #fff; border-color: #6264A7; }

        .icon-area { flex: 1; overflow-y: auto; padding: 10px; }
        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); gap: 6px;
        }
        .icon-card {
            display: flex; flex-direction: column; align-items: center;
            padding: 8px 4px 6px; border-radius: 8px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.12s;
        }
        .icon-card:hover { background: #f5f5ff; border-color: #c8c8f0; }
        .icon-card.selected { background: #eef0ff; border-color: #6264A7; }
        .icon-card img { width: 32px; height: 32px; margin-bottom: 4px; }
        .icon-card .name {
            font-size: 8px; color: #888; text-align: center; line-height: 1.2;
            word-break: break-word; max-height: 20px; overflow: hidden;
        }

        .state-msg {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: #aaa; gap: 8px; padding: 20px; text-align: center;
        }
        .state-msg .emoji { font-size: 36px; }
        .spinner {
            width: 24px; height: 24px; border: 3px solid #e0e0e0;
            border-top-color: #6264A7; border-radius: 50%;
            animation: spin 0.5s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .bottom-panel {
            border-top: 1px solid #e8e8e8; padding: 10px 16px;
            background: #fafafa; flex-shrink: 0;
        }
        .selected-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .selected-info img { width: 28px; height: 28px; }
        .selected-info .sel-name { font-weight: 600; font-size: 12px; color: #6264A7; }
        .size-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .size-row label { font-size: 12px; color: #666; }
        .size-row input[type="range"] { flex: 1; accent-color: #6264A7; }
        .size-val { font-size: 12px; font-weight: 600; color: #6264A7; min-width: 30px; }
        .insert-btn {
            width: 100%; padding: 9px; background: #6264A7; color: #fff;
            border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .insert-btn:hover { background: #4f52a0; }
        .insert-btn:disabled { background: #c8c8d0; cursor: default; }
        .status { margin-top: 5px; font-size: 11px; text-align: center; color: #888; min-height: 16px; }
        .status.ok { color: #107c10; font-weight: 600; }
        .status.err { color: #d13438; }

        .icon-area::-webkit-scrollbar { width: 6px; }
        .icon-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
    </style>
</head>
<body>

<!-- No h1 header — the add-in frame already shows "Icon Search" -->
<div class="header">
    <div class="search-wrap">
        <input type="text" id="q" placeholder="Search icons… e.g. heart, chart, star" autofocus />
        <button id="searchBtn">Go</button>
    </div>
</div>

<div class="filters">
    <button class="pill active" data-prefix="fluent" data-type="icon">Fluent ★</button>
    <button class="pill" data-prefix="mdi" data-type="icon">Material</button>
    <button class="pill" data-prefix="heroicons" data-type="icon">Heroicons</button>
    <button class="pill" data-prefix="tabler" data-type="icon">Tabler</button>
    <button class="pill" data-prefix="lucide" data-type="icon">Lucide</button>
    <button class="pill" data-prefix="ph" data-type="icon">Phosphor</button>
    <button class="pill" data-prefix="" data-type="icon">All 200k+</button>
    <button class="pill" data-prefix="" data-type="emoji">Fluent Emoji</button>
</div>

<div class="icon-area" id="iconArea">
    <div class="state-msg">
        <span class="emoji">🔍</span>
        <span>Search for an icon to get started</span>
    </div>
</div>

<div class="bottom-panel" id="bottomPanel" style="display:none;">
    <div class="selected-info" id="selInfo"></div>
    <div class="size-row">
        <label>Size:</label>
        <input type="range" id="sizeSlider" min="0.5" max="4" step="0.25" value="1.5" />
        <span class="size-val" id="sizeVal">1.5"</span>
    </div>
    <button class="insert-btn" id="insertBtn" disabled>Insert into Slide</button>
    <div class="status" id="status"></div>
</div>

<canvas id="cvs" style="display:none;"></canvas>

<script>
var ICONIFY_SEARCH_URL = "https://api.iconify.design/search";
var ICONIFY_SVG = "https://api.iconify.design/";
var EMOJI_LIST_URL = "https://api.github.com/repos/microsoft/fluentui-emoji/contents/assets";
var EMOJI_PNG_BASE = "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/";

var selectedIcon = null;  // { prefix, name, full, type:"icon"|"emoji", emojiFolder }
var activePrefix = "fluent";
var activeType = "icon";
var emojiCache = null;  // cached list of emoji folder names

var qEl = document.getElementById("q");
var searchBtn = document.getElementById("searchBtn");
var iconArea = document.getElementById("iconArea");
var bottomPanel = document.getElementById("bottomPanel");
var selInfo = document.getElementById("selInfo");
var insertBtn = document.getElementById("insertBtn");
var sizeSlider = document.getElementById("sizeSlider");
var sizeValEl = document.getElementById("sizeVal");
var statusEl = document.getElementById("status");
var canvas = document.getElementById("cvs");

var isOfficeReady = false;

function initOffice() {
    try {
        if (typeof Office !== "undefined" && Office.onReady) {
            Office.onReady(function() {
                isOfficeReady = true;
                setStatus("Ready", "");
            });
        }
    } catch(e) {}
}
initOffice();

// Retry Office init after script loads (async)
setTimeout(function() {
    if (!isOfficeReady) initOffice();
}, 2000);
setTimeout(function() {
    if (!isOfficeReady) setStatus("Ready", "");
}, 4000);

/* ── Filter pills ────────────────────────── */
document.querySelectorAll(".pill").forEach(function(pill) {
    pill.addEventListener("click", function() {
        document.querySelector(".pill.active").classList.remove("active");
        pill.classList.add("active");
        activePrefix = pill.dataset.prefix;
        activeType = pill.dataset.type;
        if (qEl.value.trim()) doSearch();
    });
});

/* ── Search ──────────────────────────────── */
searchBtn.addEventListener("click", doSearch);
qEl.addEventListener("keydown", function(e) { if (e.key === "Enter") doSearch(); });

async function doSearch() {
    var query = qEl.value.trim();
    if (!query) return;
    searchBtn.disabled = true;
    iconArea.innerHTML = '<div class="state-msg"><div class="spinner"></div></div>';
    bottomPanel.style.display = "none";
    selectedIcon = null;

    try {
        if (activeType === "emoji") {
            await searchEmojis(query);
        } else {
            await searchIcons(query);
        }
    } catch(err) {
        iconArea.innerHTML = '<div class="state-msg"><span class="emoji">⚠️</span><span>' + esc(err.message) + '</span></div>';
    } finally {
        searchBtn.disabled = false;
    }
}

/* ── Iconify search ──────────────────────── */
async function searchIcons(query) {
    var url = ICONIFY_SEARCH_URL + "?query=" + encodeURIComponent(query) + "&limit=48";
    if (activePrefix) url += "&prefixes=" + activePrefix;
    var resp = await fetch(url);
    if (!resp.ok) throw new Error("Search failed");
    var data = await resp.json();
    var icons = data.icons || [];
    if (icons.length === 0) {
        iconArea.innerHTML = '<div class="state-msg"><span class="emoji">😕</span><span>No results. Try another keyword or library.</span></div>';
        return;
    }
    var parsed = icons.map(function(full) {
        var parts = full.split(":");
        return { prefix: parts[0], name: parts.slice(1).join(":"), full: full, type: "icon" };
    });
    renderIconGrid(parsed);
}

/* ── Fluent Emoji search ─────────────────── */
async function searchEmojis(query) {
    if (!emojiCache) {
        var resp = await fetch(EMOJI_LIST_URL);
        if (!resp.ok) throw new Error("Could not load emoji list");
        var data = await resp.json();
        emojiCache = data.filter(function(d) { return d.type === "dir"; }).map(function(d) { return d.name; });
    }
    var lq = query.toLowerCase();
    var matches = emojiCache.filter(function(n) { return n.toLowerCase().indexOf(lq) >= 0; });
    if (matches.length === 0) {
        iconArea.innerHTML = '<div class="state-msg"><span class="emoji">😕</span><span>No emojis found for "' + esc(query) + '"</span></div>';
        return;
    }
    renderEmojiGrid(matches.slice(0, 48));
}

/* ── Render icon grid ────────────────────── */
function renderIconGrid(icons) {
    var html = '<div class="icon-grid">';
    icons.forEach(function(ic) {
        var svgUrl = ICONIFY_SVG + encodeURIComponent(ic.prefix) + "/" + encodeURIComponent(ic.name) + ".svg?width=72&height=72&color=%23333";
        html += '<div class="icon-card" data-prefix="' + esc(ic.prefix) + '" data-name="' + esc(ic.name) + '" data-full="' + esc(ic.full) + '" data-type="icon">'
             + '<img src="' + svgUrl + '" loading="lazy" />'
             + '<div class="name">' + esc(ic.name) + '</div></div>';
    });
    html += '</div>';
    iconArea.innerHTML = html;
    bindCardEvents();
}

/* ── Render emoji grid ───────────────────── */
function renderEmojiGrid(names) {
    var html = '<div class="icon-grid">';
    names.forEach(function(name) {
        var fileName = name.toLowerCase().replace(/ /g, "_");
        var pngUrl = EMOJI_PNG_BASE + encodeURIComponent(name) + "/3D/" + fileName + "_3d.png";
        html += '<div class="icon-card" data-full="' + esc(name) + '" data-type="emoji" data-emoji-folder="' + esc(name) + '" data-emoji-png="' + esc(pngUrl) + '">'
             + '<img src="' + pngUrl + '" loading="lazy" onerror="this.style.display=\'none\'" />'
             + '<div class="name">' + esc(name) + '</div></div>';
    });
    html += '</div>';
    iconArea.innerHTML = html;
    bindCardEvents();
}

/* ── Bind click + double-click on cards ──── */
function bindCardEvents() {
    document.querySelectorAll(".icon-card").forEach(function(card) {
        card.addEventListener("click", function() { selectCard(card); });
        card.addEventListener("dblclick", function() {
            selectCard(card);
            doInsert();
        });
    });
}

function selectCard(card) {
    var prev = document.querySelector(".icon-card.selected");
    if (prev) prev.classList.remove("selected");
    card.classList.add("selected");

    var type = card.dataset.type;
    if (type === "emoji") {
        selectedIcon = { full: card.dataset.full, type: "emoji", emojiPng: card.dataset.emojiPng };
        selInfo.innerHTML = '<img src="' + esc(card.dataset.emojiPng) + '" /><span class="sel-name">' + esc(card.dataset.full) + '</span>';
    } else {
        selectedIcon = { prefix: card.dataset.prefix, name: card.dataset.name, full: card.dataset.full, type: "icon" };
        var svgUrl = ICONIFY_SVG + encodeURIComponent(selectedIcon.prefix) + "/" + encodeURIComponent(selectedIcon.name) + ".svg?width=72&height=72&color=%23333";
        selInfo.innerHTML = '<img src="' + svgUrl + '" /><span class="sel-name">' + esc(selectedIcon.full) + '</span>';
    }
    bottomPanel.style.display = "block";
    insertBtn.disabled = false;
    setStatus("", "");
}

/* ── Size slider ─────────────────────────── */
sizeSlider.addEventListener("input", function() { sizeValEl.textContent = sizeSlider.value + '"'; });

/* ── Insert button ───────────────────────── */
insertBtn.addEventListener("click", doInsert);

async function doInsert() {
    if (!selectedIcon) return;
    insertBtn.disabled = true;
    setStatus("Preparing...", "");

    try {
        var base64data, coercionType;

        if (selectedIcon.type === "emoji") {
            // Emoji: fetch PNG, insert as image (PNG — colors are already baked in)
            var resp = await fetch(selectedIcon.emojiPng);
            if (!resp.ok) throw new Error("Failed to download emoji");
            var blob = await resp.blob();
            base64data = await blobToBase64(blob);
            coercionType = "image";
        } else {
            // Icon: insert as SVG so colors can be changed in PowerPoint
            var svgUrl = ICONIFY_SVG + encodeURIComponent(selectedIcon.prefix) + "/" + encodeURIComponent(selectedIcon.name) + ".svg?width=512&height=512";
            var resp = await fetch(svgUrl);
            if (!resp.ok) throw new Error("Failed to download icon");
            var svgText = await resp.text();
            // Office.js needs base64 for setSelectedDataAsync with Image coercion
            // But SVG insert requires converting to base64 PNG for compatibility
            var base64png = await svgToPngBase64(svgText, 1024);
            base64data = base64png;
            coercionType = "image";
        }

        if (isOfficeReady) {
            setStatus("Inserting...", "");
            Office.context.document.setSelectedDataAsync(base64data, {
                coercionType: Office.CoercionType.Image,
                imageWidth: parseFloat(sizeSlider.value) * 72,
                imageHeight: parseFloat(sizeSlider.value) * 72
            }, function(result) {
                if (result.status === Office.AsyncResultStatus.Succeeded) {
                    setStatus("Inserted ✓", "ok");
                } else {
                    setStatus("Error: " + result.error.message, "err");
                }
                insertBtn.disabled = false;
            });
        } else {
            // Fallback: try Office.js anyway (it may have loaded late)
            try {
                Office.context.document.setSelectedDataAsync(base64data, {
                    coercionType: Office.CoercionType.Image,
                    imageWidth: parseFloat(sizeSlider.value) * 72,
                    imageHeight: parseFloat(sizeSlider.value) * 72
                }, function(result) {
                    if (result.status === Office.AsyncResultStatus.Succeeded) {
                        isOfficeReady = true;
                        setStatus("Inserted ✓", "ok");
                    } else {
                        setStatus("Error: " + result.error.message, "err");
                    }
                    insertBtn.disabled = false;
                });
            } catch(officeErr) {
                // Last resort: download the image
                var byteChars = atob(base64data);
                var byteArr = new Uint8Array(byteChars.length);
                for (var i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
                var blob = new Blob([byteArr], { type: "image/png" });
                var a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = (selectedIcon.full || "icon").replace(/[:/]/g, "_") + ".png";
                a.click();
                URL.revokeObjectURL(a.href);
                setStatus("Downloaded — drag into your slide", "ok");
                insertBtn.disabled = false;
            }
        }
    } catch(err) {
        setStatus("Error: " + err.message, "err");
        insertBtn.disabled = false;
    }
}

/* ── SVG to PNG via Canvas ───────────────── */
function svgToPngBase64(svgText, size) {
    return new Promise(function(resolve, reject) {
        var blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var img = new Image();
        img.onload = function() {
            canvas.width = size; canvas.height = size;
            var ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, size, size);
            ctx.drawImage(img, 0, 0, size, size);
            URL.revokeObjectURL(url);
            resolve(canvas.toDataURL("image/png").split(",")[1]);
        };
        img.onerror = function() { URL.revokeObjectURL(url); reject(new Error("Render failed")); };
        img.src = url;
    });
}

/* ── Helpers ──────────────────────────────── */
function blobToBase64(b) {
    return new Promise(function(r) {
        var f = new FileReader();
        f.onloadend = function() { r(f.result.split(",")[1]); };
        f.readAsDataURL(b);
    });
}
function setStatus(m, c) { statusEl.textContent = m; statusEl.className = "status" + (c ? " " + c : ""); }
function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
